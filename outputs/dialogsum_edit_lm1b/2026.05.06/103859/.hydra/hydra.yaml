hydra:
  run:
    dir: ./outputs/${data.train}/${now:%Y.%m.%d}/${now:%H%M%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - algo=flm_edit_finetune
    - algo.pretrained_flm_path=/mnt/swordfish-pool2/ck3255/flm-edit/checkpoints/lm1b_flm.ckpt
    - algo.pretrained_use_ema=true
    - algo.freeze_backbone=false
    - data=dialogsum_edit_lm1b
    - model=small
    - model.length=128
    - trainer.max_steps=50000
    - loader.global_batch_size=64
    - optim.lr=1e-4
    - training.ema=0.9999
    - wandb.name=flm_edit_finetune_lm1b_dialogsum_edit_lm1b
  job:
    name: main
    chdir: true
    override_dirname: algo.freeze_backbone=false,algo.pretrained_flm_path=/mnt/swordfish-pool2/ck3255/flm-edit/checkpoints/lm1b_flm.ckpt,algo.pretrained_use_ema=true,algo=flm_edit_finetune,data=dialogsum_edit_lm1b,loader.global_batch_size=64,model.length=128,model=small,optim.lr=1e-4,trainer.max_steps=50000,training.ema=0.9999,wandb.name=flm_edit_finetune_lm1b_dialogsum_edit_lm1b
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /mnt/swordfish-pool2/ck3255/flm-edit
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /mnt/swordfish-pool2/ck3255/flm-edit/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /mnt/swordfish-pool2/ck3255/flm-edit/outputs/dialogsum_edit_lm1b/2026.05.06/103859
    choices:
      algo: flm_edit_finetune
      lr_scheduler: constant_warmup
      strategy: ddp
      model: small
      data: dialogsum_edit_lm1b
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
